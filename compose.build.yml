# Maintainer override: build images from this repo instead of pulling Hub.
# Tag authority: see REFERENCE.md (compose.yml image: lines only).
# Export build-args first (scripts/build-images.sh|.ps1 and compose_stack_build / Invoke-ComposeBuild do this).
# Usage (from repo root, after .env is set):
#   ./scripts/build-images.sh
#   .\scripts\build-images.ps1
services:
  opensearch:
    build:
      context: ./docker/opensearch
      dockerfile: Dockerfile
      args:
        OPENSEARCH_VERSION: ${OPENSEARCH_VERSION}
        AV_IMAGE_REVISION: ${AV_IMAGE_REVISION}
        IMAGE_TAG: ${IMAGE_TAG}

  opensearch-dashboards:
    build:
      context: ./docker/opensearch-dashboards
      dockerfile: Dockerfile
      args:
        OPENSEARCH_VERSION: ${OPENSEARCH_VERSION}
        AV_IMAGE_REVISION: ${AV_IMAGE_REVISION}
        IMAGE_TAG: ${IMAGE_TAG}
