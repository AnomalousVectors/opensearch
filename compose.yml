# Anomalous Vectors OpenSearch stack (Hub images by default).
# Image tag is hardcoded here so `git pull` updates what Compose runs.
# Project name comes from COMPOSE_PROJECT_NAME in .env (default: opensearch).

services:
  opensearch:
    image: anomalousvectors/opensearch:3.7.0-av.6
    pull_policy: always
    container_name: opensearch
    environment:
      - cluster.name=${CLUSTER_NAME}
      - node.name=opensearch
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS}
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - DISABLE_SECURITY_PLUGIN=false
      - OPENSEARCH_PUBLISH_HOST=${OPENSEARCH_PUBLISH_HOST}
      - OPENSEARCH_BIND_ADDRESS=${OPENSEARCH_BIND_ADDRESS}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ${DATA_VOLUME_ROOT}/data:/usr/share/opensearch/data
      - ${DATA_VOLUME_ROOT}/logs:/usr/share/opensearch/logs
      - ${DATA_VOLUME_ROOT}/certs:/usr/share/opensearch/config/certs
    ports:
      - "${OPENSEARCH_BIND_ADDRESS}:${OPENSEARCH_PORT}:${OPENSEARCH_PORT}"
      - "${OPENSEARCH_BIND_ADDRESS}:${OPENSEARCH_DIAGNOSTICS_PORT}:9600"
    networks:
      opensearch-net:
        aliases:
          - opensearch.url
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -sk -o /dev/null -w '%{http_code}' https://opensearch.url:${OPENSEARCH_PORT}/_cluster/health); test \"$$code\" = '200' || test \"$$code\" = '401' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  opensearch-dashboards:
    image: anomalousvectors/opensearch-dashboards:3.7.0-av.6
    pull_policy: always
    container_name: opensearch-dashboards
    ports:
      - "${OPENSEARCH_DASHBOARDS_BIND_ADDRESS}:${OPENSEARCH_DASHBOARDS_PORT}:${OPENSEARCH_DASHBOARDS_PORT}"
    environment:
      - OPENSEARCH_DASHBOARDS_BIND_ADDRESS=${OPENSEARCH_DASHBOARDS_BIND_ADDRESS}
      - OPENSEARCH_DASHBOARDS_PORT=${OPENSEARCH_DASHBOARDS_PORT}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}
      - OPENSEARCH_HOSTS=["https://${OPENSEARCH_PUBLISH_HOST}:${OPENSEARCH_PORT}"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=false
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_DASHBOARDS_PASSWORD:-}
    volumes:
      - ${DATA_VOLUME_ROOT}/opensearch-dashboards/data:/usr/share/opensearch-dashboards/data
      - ${DATA_VOLUME_ROOT}/opensearch-dashboards/logs:/usr/share/opensearch-dashboards/logs
      - ${DATA_VOLUME_ROOT}/certs:/usr/share/opensearch-dashboards/config/certs:ro
    networks:
      - opensearch-net
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -sk -o /dev/null -w '%{http_code}' https://localhost:${OPENSEARCH_DASHBOARDS_PORT}); test \"$$code\" = '200' || test \"$$code\" = '302' || test \"$$code\" = '401' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

networks:
  opensearch-net:
    driver: bridge
